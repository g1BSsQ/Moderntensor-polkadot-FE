<html lang="en" class="dark">

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "neon-cyan": "#00f3ff",
                        "neon-pink": "#ff00ff",
                        "neon-purple": "#bc13fe",
                        "neon-blue": "#135bec",
                        "neon-green": "#00ffa3",
                        "neon-red": "#ff0055",
                        "bg-dark": "#020408",
                        "panel-dark": "#0a0e17",
                        "panel-border": "#1f293a",
                        "card-dark": "#0a0c12",
                        "text-secondary": "#cbd5e1", 
                        "background-dark": "#050b14",
                        "surface-dark": "#0f172a",
                        "console-bg": "#0a1120",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["Rajdhani", "sans-serif"],
                        "sans": ["Noto Sans", "sans-serif"],
                        "mono": ["ui-monospace", "SFMono-Regular", "Menlo", "Monaco", "Consolas", "monospace"],
                    },
                    backgroundImage: {
                        'grid-pattern': "linear-gradient(to right, #1f293a 1px, transparent 1px), linear-gradient(to bottom, #1f293a 1px, transparent 1px)",
                        "gradient-radial": "radial-gradient(var(--tw-gradient-stops))",
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'marquee': 'marquee 40s linear infinite',
                    },
                    keyframes: {
                        marquee: {
                            '0%': { transform: 'translateX(0%)' },
                            '100%': { transform: 'translateX(-50%)' },
                        }
                    }
                },
            },
        }
    </script>
    <style>
        body {
            background-color: #020408;
            color: #f1f5f9;
            font-weight: 400;
            overflow-x: hidden;
        }
        /* Cinematic Noise Overlay */
        .noise-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
            mix-blend-mode: overlay;
        }
        /* Subtle Scanline */
        .scanline-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9998;
            pointer-events: none;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px;
            opacity: 0.15;
        }
        
        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        .glass-panel {
            background: rgba(10, 14, 23, 0.7); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0,0,0,0.3), inset 0 0 0 1px rgba(255, 255, 255, 0.03);
        }
        /* Toast Animations */
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .toast-enter {
            animation: slideInRight 0.3s ease-out forwards;
        }
        .console-panel {
            background: rgba(10, 17, 32, 0.95);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 30px rgba(0,0,0,0.1);
            font-family: 'ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', monospace;
            font-size: 0.875rem;
        }
        .neon-text {
            text-shadow: 0 0 5px rgba(0, 243, 255, 0.5), 0 0 10px rgba(0, 243, 255, 0.3);
        }
        /* Subnets Hub Specific Styles */
        .glass-card-hover {
            transition: all 0.3s;
        }
        .glass-card-hover:hover {
            background: rgba(20, 28, 48, 0.9);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.1);
            border-color: rgba(0, 243, 255, 0.3);
        }
        .neon-border-cyan {
            border-left: 2px solid #00f3ff;
            box-shadow: inset 10px 0 20px -10px rgba(0,243,255,0.1);
        }
        .neon-border-pink {
            border-right: 2px solid #ff00ff;
            box-shadow: inset -10px 0 20px -10px rgba(255,0,255,0.1);
        }
        .glow-text {
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }
        .glow-text-pink {
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
        }
        .sparkline-glow {
            filter: drop-shadow(0 0 3px #00f3ff);
        }
        .sparkline-glow-pink {
            filter: drop-shadow(0 0 3px #ff00ff);
        }
        .perspective-grid {
            background-size: 60px 60px;
            mask-image: linear-gradient(to bottom, transparent, 5%, black, 90%, transparent);
            transform: perspective(1200px) rotateX(20deg) scale(1.2);
            opacity: 0.15;
        }
        .neural-flow-line {
            position: absolute;
            background: linear-gradient(90deg, transparent, var(--tw-gradient-stops), transparent);
        }
        .glitch-effect {
            position: relative;
        }
        .glitch-effect::before,
        .glitch-effect::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050b14;
        }
        .glitch-effect::before {
            left: 2px;
            text-shadow: -1px 0 #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }
        .glitch-effect::after {
            left: -2px;
            text-shadow: -1px 0 #00fff9;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim2 5s infinite linear alternate-reverse;
        }
        @keyframes glitch-anim {
            0% { clip: rect(35px, 9999px, 36px, 0); }
            20% { clip: rect(69px, 9999px, 86px, 0); }
            40% { clip: rect(2px, 9999px, 88px, 0); }
            60% { clip: rect(51px, 9999px, 12px, 0); }
            80% { clip: rect(10px, 9999px, 80px, 0); }
            100% { clip: rect(93px, 9999px, 50px, 0); }
        }
        @keyframes glitch-anim2 {
            0% { clip: rect(19px, 9999px, 90px, 0); }
            20% { clip: rect(32px, 9999px, 11px, 0); }
            40% { clip: rect(89px, 9999px, 2px, 0); }
            60% { clip: rect(13px, 9999px, 5px, 0); }
            80% { clip: rect(76px, 9999px, 63px, 0); }
            100% { clip: rect(2px, 9999px, 35px, 0); }
        }
        /* View Transitions */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        /* Mobile Menu Transitions */
        @keyframes slideInRight {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
        .animate-slide-in-right {
            animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Holographic Card Effects */
        .holo-card {
            background: rgba(10, 12, 18, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }
        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #020408; 
        }
        ::-webkit-scrollbar-thumb {
            background: #1f293a; 
            border-radius: 4px;
            border: 2px solid #020408;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #00f3ff; 
        }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "recharts": "https://esm.sh/recharts@^3.6.0"
  }
}
</script>
</head>
  <body>
    <div class="noise-bg"></div>
    <div class="scanline-overlay"></div>
    <canvas id="canvas-bg"></canvas>
    <div id="root"></div>
    <script>
        // Cyber particle background
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.3; // Slower, smoother
                this.vy = (Math.random() - 0.5) * 0.3;
                this.size = Math.random() * 1.5;
                this.color = Math.random() > 0.8 ? '#00f3ff' : (Math.random() > 0.5 ? '#ff00ff' : '#1f293a');
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = 0.4;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < 60; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            // Draw connections
            particles.forEach((p, i) => {
                p.update();
                p.draw();
                for (let j = i + 1; j < particles.length; j++) {
                    const p2 = particles[j];
                    const dx = p.x - p2.x;
                    const dy = p.y - p2.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) {
                        ctx.beginPath();
                        // Fade out line with distance
                        ctx.strokeStyle = `rgba(31, 41, 58, ${0.15 - dist/1000})`; 
                        if(p.color === '#00f3ff' || p2.color === '#00f3ff') {
                             ctx.strokeStyle = `rgba(0, 243, 255, ${0.1 - dist/1200})`;
                        }
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        init();
        animate();
    </script>
  </body>
</html>
